name: Build Resume and Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🆕 Extract tag (for reuse)
      - name: Extract tag
        id: vars
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 🆕 Inject version into LaTeX (non-intrusive)
      - name: Inject version into LaTeX
        run: |
          echo "\\newcommand{\\version}{${{ steps.vars.outputs.TAG }}}" > version.tex

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Resume.tex

      - name: Rename PDF with tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv Resume.pdf Resume-${TAG}.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Resume ${{ steps.vars.outputs.TAG }}          # 🆕 nice title
          generate_release_notes: true                        # 🆕 auto notes
          files: |
            Resume-*.pdf
            Resume.tex